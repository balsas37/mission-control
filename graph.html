<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Knowledge Graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #141414;
  --bg-raised: #1c1c1c;
  --bg-card: #222222;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text-1: #e8ecf0;
  --text-2: #888888;
  --text-3: #555555;
  --accent: #ffffff;
  --sidebar-width: 260px;
  --sidebar-bg: #181818;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text-1);
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Sidebar */
.sidebar {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: var(--sidebar-width);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  z-index: 100;
  display: flex;
  flex-direction: column;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.sidebar.collapsed {
  transform: translateX(calc(-1 * var(--sidebar-width)));
}

.sidebar-header {
  padding: 20px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 {
  font-size: 15px;
  font-weight: 400;
  letter-spacing: -0.01em;
  color: var(--text-2);
}
.sidebar-header .back-link {
  font-size: 13px;
  color: var(--text-3);
  text-decoration: none;
  cursor: pointer;
  transition: color 0.2s;
}
.sidebar-header .back-link:hover { color: var(--text-1); }

.sidebar-search {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-search input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text-1);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.sidebar-search input:focus {
  border-color: var(--border-hover);
}
.sidebar-search input::placeholder { color: var(--text-3); }

.sidebar-clusters {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.cluster-item {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  cursor: pointer;
  transition: background 0.15s;
  gap: 10px;
}
.cluster-item:hover { background: rgba(255,255,255,0.03); }
.cluster-item.active { background: rgba(255,255,255,0.06); }
.cluster-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.cluster-label {
  flex: 1;
  font-size: 13px;
  font-weight: 400;
  color: var(--text-2);
}
.cluster-item.active .cluster-label { color: var(--text-1); }
.cluster-count {
  font-size: 12px;
  color: var(--text-3);
  font-variant-numeric: tabular-nums;
}

.sidebar-stats {
  padding: 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.02em;
}

/* Graph Canvas */
.graph-container {
  position: fixed;
  left: var(--sidebar-width);
  top: 0; right: 0; bottom: 0;
  transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.sidebar.collapsed ~ .graph-container {
  left: 0;
}

canvas {
  width: 100%;
  height: 100%;
  display: block;
  cursor: grab;
}
canvas:active { cursor: grabbing; }

/* Toggle sidebar button */
.toggle-sidebar {
  position: fixed;
  top: 16px;
  left: calc(var(--sidebar-width) + 12px);
  z-index: 101;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  color: var(--text-2);
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  line-height: 1;
}
.sidebar.collapsed ~ .toggle-sidebar {
  left: 12px;
}
.toggle-sidebar:hover { border-color: var(--border-hover); color: var(--text-1); }

/* Node detail panel */
.node-detail {
  position: fixed;
  bottom: 0;
  left: var(--sidebar-width);
  right: 0;
  background: var(--bg-raised);
  border-top: 1px solid var(--border);
  padding: 20px 24px;
  transform: translateY(100%);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 50;
  max-height: 40vh;
  overflow-y: auto;
}
.node-detail.visible { transform: translateY(0); }
.sidebar.collapsed ~ .node-detail { left: 0; }

.node-detail-title {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}
.node-detail-path {
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: 8px;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.node-detail-desc {
  font-size: 14px;
  color: var(--text-2);
  line-height: 1.5;
  margin-bottom: 12px;
}
.node-detail-meta {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.meta-item {
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.meta-item span { color: var(--text-2); text-transform: none; }
.node-detail-close {
  position: absolute;
  top: 16px; right: 16px;
  background: none;
  border: none;
  color: var(--text-3);
  cursor: pointer;
  font-size: 18px;
}
.node-detail-close:hover { color: var(--text-1); }

/* Loading */
.loading {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 14px;
  color: var(--text-3);
  z-index: 200;
}

/* Mobile */
@media (max-width: 768px) {
  :root { --sidebar-width: 100vw; }
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  .graph-container { left: 0; }
  .toggle-sidebar { left: 12px; }
  .sidebar.open ~ .toggle-sidebar { left: calc(100vw - 48px); }
  .node-detail { left: 0; max-height: 50vh; }
  .node-detail-title { font-size: 15px; }
}
</style>
</head>
<body>
<div class="loading" id="loading">loading graph...</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a class="back-link" onclick="window.location.href='index.html'">← back</a>
    <h1>knowledge graph</h1>
  </div>
  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="search notes...">
  </div>
  <div class="sidebar-clusters" id="clusterList"></div>
  <div class="sidebar-stats" id="sidebarStats"></div>
</div>

<!-- Toggle -->
<button class="toggle-sidebar" id="toggleSidebar">☰</button>

<!-- Graph -->
<div class="graph-container" id="graphContainer">
  <canvas id="graphCanvas"></canvas>
</div>

<!-- Node Detail -->
<div class="node-detail" id="nodeDetail">
  <button class="node-detail-close" onclick="hideDetail()">×</button>
  <div class="node-detail-title" id="detailTitle"></div>
  <div class="node-detail-path" id="detailPath"></div>
  <div class="node-detail-desc" id="detailDesc"></div>
  <div class="node-detail-meta" id="detailMeta"></div>
</div>

<script>
// ============================================
// KNOWLEDGE GRAPH VISUALIZATION
// Inspired by arscontexta.org
// Built for Beno's memory vault
// ============================================

const CONFIG = {
  // Physics
  repulsion: 2000,
  attraction: 0.005,
  damping: 0.9,
  centerGravity: 0.008,
  maxVelocity: 3,
  // Rendering
  edgeOpacity: 0.08,
  edgeWidth: 0.5,
  nodeMinSize: 3,
  nodeMaxSize: 14,
  labelMinZoom: 1.2,
  // Synapse particles
  particleCount: 120,
  particleSpeed: 0.003,
  particleSize: 1.5,
  particleOpacity: 0.35,
  // Interaction
  hoverRadius: 20,
  clickRadius: 15,
};

let graph = null;
let nodes = [];
let edges = [];
let particles = [];
let canvas, ctx;
let width, height, dpr;

// Camera
let camera = { x: 0, y: 0, zoom: 0.45 };
let targetCamera = { x: 0, y: 0, zoom: 0.45 };

// Interaction state
let dragging = false;
let dragStart = { x: 0, y: 0 };
let cameraDragStart = { x: 0, y: 0 };
let hoveredNode = null;
let selectedNode = null;
let activeCluster = null;
let searchQuery = '';
let simulationRunning = true;
let frameCount = 0;

// Touch
let lastTouchDist = 0;
let touchStartTime = 0;

// ============================================
// DATA LOADING
// ============================================

async function loadGraph() {
  try {
    const resp = await fetch('data/knowledge-graph.json');
    graph = await resp.json();

    // Initialize node positions randomly
    nodes = graph.nodes.map(n => ({
      ...n,
      x: (Math.random() - 0.5) * 600,
      y: (Math.random() - 0.5) * 600,
      vx: 0,
      vy: 0,
      fx: null, fy: null, // fixed position (when dragging)
    }));

    edges = graph.edges;

    // Build adjacency for faster lookup
    nodes.forEach(n => { n.connections = new Set(); });
    edges.forEach(e => {
      const s = nodes.find(n => n.id === e.source);
      const t = nodes.find(n => n.id === e.target);
      if (s && t) {
        s.connections.add(t.id);
        t.connections.add(s.id);
      }
    });

    // Init particles on random edges
    initParticles();

    // Render sidebar
    renderClusters();
    updateStats();

    document.getElementById('loading').style.display = 'none';

    // Start simulation
    requestAnimationFrame(tick);
  } catch (err) {
    document.getElementById('loading').textContent = 'failed to load graph data';
    console.error(err);
  }
}

// ============================================
// SYNAPSE PARTICLES
// ============================================

function initParticles() {
  particles = [];
  const validEdges = edges.filter(e =>
    nodes.find(n => n.id === e.source) && nodes.find(n => n.id === e.target)
  );
  for (let i = 0; i < CONFIG.particleCount; i++) {
    const edge = validEdges[Math.floor(Math.random() * validEdges.length)];
    particles.push({
      edge,
      t: Math.random(), // position along edge [0,1]
      speed: CONFIG.particleSpeed * (0.5 + Math.random()),
      size: CONFIG.particleSize * (0.6 + Math.random() * 0.8),
      opacity: CONFIG.particleOpacity * (0.4 + Math.random() * 0.6),
    });
  }
}

function updateParticles() {
  const validEdges = edges.filter(e =>
    nodes.find(n => n.id === e.source) && nodes.find(n => n.id === e.target)
  );
  if (!validEdges.length) return;

  particles.forEach(p => {
    p.t += p.speed;
    if (p.t > 1) {
      // Jump to random edge
      p.edge = validEdges[Math.floor(Math.random() * validEdges.length)];
      p.t = 0;
      p.speed = CONFIG.particleSpeed * (0.5 + Math.random());
    }
  });
}

// ============================================
// PHYSICS SIMULATION
// ============================================

function simulate() {
  if (!simulationRunning || frameCount > 600) return;

  const n = nodes.length;
  const visibleNodes = getVisibleNodes();

  // Repulsion (between all pairs - use Barnes-Hut approximation for large graphs)
  for (let i = 0; i < visibleNodes.length; i++) {
    for (let j = i + 1; j < visibleNodes.length; j++) {
      const a = visibleNodes[i];
      const b = visibleNodes[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const force = CONFIG.repulsion / (dist * dist);
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      if (!a.fx) { a.vx -= fx; a.vy -= fy; }
      if (!b.fx) { b.vx += fx; b.vy += fy; }
    }
  }

  // Attraction along edges
  edges.forEach(e => {
    const s = nodes.find(n => n.id === e.source);
    const t = nodes.find(n => n.id === e.target);
    if (!s || !t) return;
    const dx = t.x - s.x;
    const dy = t.y - s.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const force = dist * CONFIG.attraction;
    const fx = (dx / dist) * force;
    const fy = (dy / dist) * force;
    if (!s.fx) { s.vx += fx; s.vy += fy; }
    if (!t.fx) { t.vx -= fx; t.vy -= fy; }
  });

  // Center gravity
  visibleNodes.forEach(node => {
    if (node.fx) return;
    node.vx -= node.x * CONFIG.centerGravity;
    node.vy -= node.y * CONFIG.centerGravity;
  });

  // Apply velocity with damping
  visibleNodes.forEach(node => {
    if (node.fx !== null) {
      node.x = node.fx;
      node.y = node.fy;
      node.vx = 0;
      node.vy = 0;
      return;
    }
    node.vx *= CONFIG.damping;
    node.vy *= CONFIG.damping;
    // Clamp velocity
    const speed = Math.sqrt(node.vx * node.vx + node.vy * node.vy);
    if (speed > CONFIG.maxVelocity) {
      node.vx = (node.vx / speed) * CONFIG.maxVelocity;
      node.vy = (node.vy / speed) * CONFIG.maxVelocity;
    }
    node.x += node.vx;
    node.y += node.vy;
  });

  frameCount++;
}

// ============================================
// RENDERING
// ============================================

function getVisibleNodes() {
  return nodes.filter(n => {
    if (activeCluster && n.cluster !== activeCluster) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return n.label.toLowerCase().includes(q) ||
             (n.description && n.description.toLowerCase().includes(q));
    }
    return true;
  });
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - width / 2) / camera.zoom + camera.x,
    y: (sy - height / 2) / camera.zoom + camera.y,
  };
}

function worldToScreen(wx, wy) {
  return {
    x: (wx - camera.x) * camera.zoom + width / 2,
    y: (wy - camera.y) * camera.zoom + height / 2,
  };
}

function render() {
  ctx.clearRect(0, 0, width * dpr, height * dpr);
  ctx.save();
  ctx.scale(dpr, dpr);

  const visibleNodes = getVisibleNodes();
  const visibleIds = new Set(visibleNodes.map(n => n.id));

  // Smooth camera
  camera.x += (targetCamera.x - camera.x) * 0.1;
  camera.y += (targetCamera.y - camera.y) * 0.1;
  camera.zoom += (targetCamera.zoom - camera.zoom) * 0.1;

  // Draw edges
  edges.forEach(e => {
    const s = nodes.find(n => n.id === e.source);
    const t = nodes.find(n => n.id === e.target);
    if (!s || !t) return;
    if (!visibleIds.has(s.id) && !visibleIds.has(t.id)) return;

    const sp = worldToScreen(s.x, s.y);
    const tp = worldToScreen(t.x, t.y);

    // Highlight edges connected to hovered/selected node
    let opacity = CONFIG.edgeOpacity;
    let lineWidth = CONFIG.edgeWidth;
    if (hoveredNode) {
      if (hoveredNode.id === s.id || hoveredNode.id === t.id) {
        opacity = 0.25;
        lineWidth = 1;
      } else {
        opacity = 0.03;
      }
    }
    if (selectedNode) {
      if (selectedNode.connections.has(s.id) || selectedNode.connections.has(t.id) ||
          selectedNode.id === s.id || selectedNode.id === t.id) {
        opacity = Math.max(opacity, 0.2);
      }
    }

    ctx.beginPath();
    ctx.moveTo(sp.x, sp.y);
    ctx.lineTo(tp.x, tp.y);
    ctx.strokeStyle = `rgba(200, 200, 210, ${opacity})`;
    ctx.lineWidth = lineWidth;
    ctx.stroke();
  });

  // Draw particles (synapses)
  particles.forEach(p => {
    const s = nodes.find(n => n.id === p.edge.source);
    const t = nodes.find(n => n.id === p.edge.target);
    if (!s || !t) return;
    if (!visibleIds.has(s.id) && !visibleIds.has(t.id)) return;

    const x = s.x + (t.x - s.x) * p.t;
    const y = s.y + (t.y - s.y) * p.t;
    const sp = worldToScreen(x, y);

    ctx.beginPath();
    ctx.arc(sp.x, sp.y, p.size * camera.zoom, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220, 215, 200, ${p.opacity})`;
    ctx.fill();
  });

  // Draw nodes
  visibleNodes.forEach(node => {
    const sp = worldToScreen(node.x, node.y);
    const size = Math.max(CONFIG.nodeMinSize, Math.min(CONFIG.nodeMaxSize, node.size)) * camera.zoom;

    // Node glow for hovered
    if (hoveredNode && hoveredNode.id === node.id) {
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, size + 6, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, 0.06)`;
      ctx.fill();
    }

    // Node circle
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, size, 0, Math.PI * 2);

    let fillColor = node.color;
    let alpha = 0.7;
    if (hoveredNode) {
      if (hoveredNode.id === node.id) {
        alpha = 1;
      } else if (hoveredNode.connections.has(node.id)) {
        alpha = 0.85;
      } else {
        alpha = 0.2;
      }
    }
    if (selectedNode && selectedNode.id === node.id) {
      alpha = 1;
    }

    // Parse hex color and apply alpha
    const r = parseInt(fillColor.slice(1, 3), 16);
    const g = parseInt(fillColor.slice(3, 5), 16);
    const b = parseInt(fillColor.slice(5, 7), 16);
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
    ctx.fill();

    // Labels
    if (camera.zoom > CONFIG.labelMinZoom || (hoveredNode && (hoveredNode.id === node.id || hoveredNode.connections.has(node.id)))) {
      const fontSize = Math.max(9, Math.min(13, 11 * camera.zoom));
      ctx.font = `400 ${fontSize}px Inter, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      let labelAlpha = alpha * 0.8;
      if (hoveredNode && hoveredNode.id === node.id) labelAlpha = 1;

      ctx.fillStyle = `rgba(232, 236, 240, ${labelAlpha})`;
      ctx.fillText(node.label, sp.x, sp.y + size + 4);
    }
  });

  ctx.restore();
}

function tick() {
  simulate();
  updateParticles();
  render();
  requestAnimationFrame(tick);
}

// ============================================
// INTERACTION
// ============================================

function findNodeAt(sx, sy) {
  const world = screenToWorld(sx, sy);
  let closest = null;
  let closestDist = CONFIG.hoverRadius / camera.zoom;

  nodes.forEach(node => {
    const dx = node.x - world.x;
    const dy = node.y - world.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < closestDist) {
      closestDist = dist;
      closest = node;
    }
  });
  return closest;
}

function showDetail(node) {
  selectedNode = node;
  const el = document.getElementById('nodeDetail');
  document.getElementById('detailTitle').textContent = node.label;
  document.getElementById('detailPath').textContent = node.path;
  document.getElementById('detailDesc').textContent = node.description || 'No description';

  const meta = document.getElementById('detailMeta');
  meta.innerHTML = '';
  if (node.cluster) {
    meta.innerHTML += `<div class="meta-item">cluster <span>${node.cluster}</span></div>`;
  }
  if (node.created) {
    meta.innerHTML += `<div class="meta-item">created <span>${node.created}</span></div>`;
  }
  if (node.lastReweave && node.lastReweave !== 'never' && node.lastReweave !== 'null') {
    meta.innerHTML += `<div class="meta-item">last reweave <span>${node.lastReweave}</span></div>`;
  }
  const connCount = node.connections ? node.connections.size : 0;
  meta.innerHTML += `<div class="meta-item">connections <span>${connCount}</span></div>`;

  el.classList.add('visible');
}

function hideDetail() {
  selectedNode = null;
  document.getElementById('nodeDetail').classList.remove('visible');
}

// Mouse events
function initInteraction() {
  const c = document.getElementById('graphCanvas');

  c.addEventListener('mousedown', e => {
    const node = findNodeAt(e.offsetX, e.offsetY);
    if (node) {
      node.fx = node.x;
      node.fy = node.y;
      dragging = node;
      simulationRunning = true;
      frameCount = 0;
    } else {
      dragging = null;
      dragStart = { x: e.offsetX, y: e.offsetY };
      cameraDragStart = { x: targetCamera.x, y: targetCamera.y };
    }
  });

  c.addEventListener('mousemove', e => {
    if (dragging && dragging.fx !== undefined) {
      // Dragging a node
      const world = screenToWorld(e.offsetX, e.offsetY);
      dragging.fx = world.x;
      dragging.fy = world.y;
      dragging.x = world.x;
      dragging.y = world.y;
    } else if (e.buttons === 1) {
      // Panning
      const dx = (e.offsetX - dragStart.x) / camera.zoom;
      const dy = (e.offsetY - dragStart.y) / camera.zoom;
      targetCamera.x = cameraDragStart.x - dx;
      targetCamera.y = cameraDragStart.y - dy;
    } else {
      // Hover
      const node = findNodeAt(e.offsetX, e.offsetY);
      hoveredNode = node;
      c.style.cursor = node ? 'pointer' : 'grab';
    }
  });

  c.addEventListener('mouseup', e => {
    if (dragging && dragging.fx !== undefined) {
      dragging.fx = null;
      dragging.fy = null;
    }
    const node = findNodeAt(e.offsetX, e.offsetY);
    if (node && dragging === node) {
      showDetail(node);
      // Center on node
      targetCamera.x = node.x;
      targetCamera.y = node.y;
    }
    dragging = null;
  });

  c.addEventListener('mouseleave', () => {
    hoveredNode = null;
    if (dragging && dragging.fx !== undefined) {
      dragging.fx = null;
      dragging.fy = null;
    }
    dragging = null;
  });

  // Zoom
  c.addEventListener('wheel', e => {
    e.preventDefault();
    const zoomFactor = e.deltaY > 0 ? 0.92 : 1.08;
    targetCamera.zoom = Math.max(0.1, Math.min(5, targetCamera.zoom * zoomFactor));
  }, { passive: false });

  // Touch events
  c.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      const t = e.touches[0];
      const rect = c.getBoundingClientRect();
      const x = t.clientX - rect.left;
      const y = t.clientY - rect.top;
      const node = findNodeAt(x, y);
      if (node) {
        dragging = node;
        node.fx = node.x;
        node.fy = node.y;
        simulationRunning = true;
        frameCount = 0;
      } else {
        dragStart = { x: x, y: y };
        cameraDragStart = { x: targetCamera.x, y: targetCamera.y };
      }
      touchStartTime = Date.now();
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      lastTouchDist = Math.sqrt(dx * dx + dy * dy);
    }
  }, { passive: false });

  c.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      const t = e.touches[0];
      const rect = c.getBoundingClientRect();
      const x = t.clientX - rect.left;
      const y = t.clientY - rect.top;

      if (dragging && dragging.fx !== undefined) {
        const world = screenToWorld(x, y);
        dragging.fx = world.x;
        dragging.fy = world.y;
        dragging.x = world.x;
        dragging.y = world.y;
      } else {
        const dx = (x - dragStart.x) / camera.zoom;
        const dy = (y - dragStart.y) / camera.zoom;
        targetCamera.x = cameraDragStart.x - dx;
        targetCamera.y = cameraDragStart.y - dy;
      }
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (lastTouchDist > 0) {
        const scale = dist / lastTouchDist;
        targetCamera.zoom = Math.max(0.1, Math.min(5, targetCamera.zoom * scale));
      }
      lastTouchDist = dist;
    }
  }, { passive: false });

  c.addEventListener('touchend', e => {
    if (dragging && dragging.fx !== undefined) {
      if (Date.now() - touchStartTime < 300) {
        showDetail(dragging);
        targetCamera.x = dragging.x;
        targetCamera.y = dragging.y;
      }
      dragging.fx = null;
      dragging.fy = null;
    }
    dragging = null;
    lastTouchDist = 0;
  });

  // Sidebar toggle
  document.getElementById('toggleSidebar').addEventListener('click', () => {
    const sb = document.getElementById('sidebar');
    if (window.innerWidth <= 768) {
      sb.classList.toggle('open');
    } else {
      sb.classList.toggle('collapsed');
    }
    setTimeout(resizeCanvas, 350);
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value;
    simulationRunning = true;
    frameCount = 0;
  });

  // Click outside detail to close
  c.addEventListener('click', e => {
    const node = findNodeAt(e.offsetX, e.offsetY);
    if (!node) hideDetail();
  });
}

// ============================================
// SIDEBAR
// ============================================

function renderClusters() {
  const el = document.getElementById('clusterList');
  let html = '';

  // "All" option
  html += `<div class="cluster-item ${!activeCluster ? 'active' : ''}" onclick="setCluster(null)">
    <div class="cluster-dot" style="background: var(--text-1)"></div>
    <div class="cluster-label">all notes</div>
    <div class="cluster-count">${graph.stats.nodes}</div>
  </div>`;

  graph.clusters.forEach(c => {
    html += `<div class="cluster-item ${activeCluster === c.id ? 'active' : ''}" onclick="setCluster('${c.id}')">
      <div class="cluster-dot" style="background: ${c.color}"></div>
      <div class="cluster-label">${c.label}</div>
      <div class="cluster-count">${c.count}</div>
    </div>`;
  });

  el.innerHTML = html;
}

function setCluster(id) {
  activeCluster = id;
  simulationRunning = true;
  frameCount = 0;
  renderClusters();
  hideDetail();
}

function updateStats() {
  const el = document.getElementById('sidebarStats');
  el.textContent = `${graph.stats.nodes} notes · ${graph.stats.edges} connections`;
}

// ============================================
// CANVAS SETUP
// ============================================

function resizeCanvas() {
  canvas = document.getElementById('graphCanvas');
  ctx = canvas.getContext('2d');
  dpr = window.devicePixelRatio || 1;

  const container = document.getElementById('graphContainer');
  width = container.clientWidth;
  height = container.clientHeight;

  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
}

// ============================================
// INIT
// ============================================

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
initInteraction();
loadGraph();

// Auto-collapse sidebar on mobile
if (window.innerWidth <= 768) {
  document.getElementById('sidebar').classList.remove('open');
}
</script>
</body>
